<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Ziya ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

/* Confetti */

.confetti{
position:fixed;
top:-20px;
width:12px;
height:12px;
pointer-events:none;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

/* Cake Glow */

.cake{
font-size:140px;
filter:drop-shadow(
0 0 20px rgba(255,79,139,.5)
);
animation:bounce 2s infinite;
}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

}

.birthday-text{
animation:glow 2s infinite;
}

@keyframes glow{

0%{
text-shadow:
0 0 10px #ff4f8b;
}

50%{
text-shadow:
0 0 25px #ff4f8b,
0 0 40px #ff9ac2;
}

100%{
text-shadow:
0 0 10px #ff4f8b;
}

}

</style>

</head>
<body>

<!-- Music -->

<audio id="music" loop>
<source src="sanamterikasam.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="cake">
🎂
</div>

<h1 class="birthday-text">
Happy Birthday Ziya ❤️
</h1>

<p>

May your smile always shine brighter
than the candles on this cake.

<br><br>

May every dream of yours come true
and may your life be filled with
love, happiness and success. ✨

</p>

<a href="letter.html"
class="btn">

Continue 💌

</a>

</div>

<script>

/* Continue Music */

window.addEventListener("load",()=>{

if(
localStorage.getItem("birthdayMusic")
==="on"
){

const music =
document.getElementById("music");

music.play().catch(()=>{});

}

});

/* Confetti Effect */

const colors = [
"#ff4f8b",
"#ffd6e7",
"#ffb6d5",
"#ffc0cb",
"#ffffff"
];

function createConfetti(){

for(let i=0;i<8;i++){

const confetti =
document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left =
Math.random()*100+"vw";

confetti.style.background =
colors[
Math.floor(
Math.random()*colors.length
)
];

confetti.style.animationDuration =
(3+Math.random()*3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},6000);

}

}

setInterval(createConfetti,250);

/* Floating Hearts */

function createHeart(){

const heart =
document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💖";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(20+Math.random()*30)+"px";

heart.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
