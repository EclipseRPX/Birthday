<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ziya ❤️</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Background Music -->
<audio id="music" loop>
<source src="sanamterikasam.mp3" type="audio/mpeg">
</audio>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Welcome Card -->

<div class="card">

<h1 class="typewriter">
Happy Birthday Ziya ❤️
</h1>

<p>

A beautiful surprise is waiting for you...

<br><br>

Made with lots of love and best wishes 💖

</p>

<button class="btn" onclick="startSurprise()">

Start Surprise 💖

</button>

</div>

<script>

/* Start Music + Go To Next Page */

function startSurprise(){

const music =
document.getElementById("music");

music.play();

localStorage.setItem(
"birthdayMusic",
"on"
);

setTimeout(()=>{

window.location.href =
"birthday.html";

},1000);

}

/* Floating Hearts */

function createHeart(){

const heart =
document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "💖";

heart.style.left =
Math.random()*100 + "vw";

heart.style.fontSize =
(20 + Math.random()*30)+"px";

heart.style.animationDuration =
(5 + Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
