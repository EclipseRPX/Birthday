<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ziya ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

.typewriter{
font-size:3rem;
color:#ff4f8b;
margin-bottom:20px;
line-height:1.2;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.typewriter{
font-size:2.2rem;
line-height:1.3;
}

.card{
padding:25px;
}

}

</style>

</head>
<body>

<!-- Music -->

<audio id="music" loop>
<source src="sanamterikasam.mp3" type="audio/mpeg">
</audio>

<!-- Main Card -->

<div class="card">

<h1 class="typewriter">
Happy Birthday Ziya ❤️
</h1>

<p>

A beautiful surprise is waiting for you...

<br><br>

Made with lots of love and best wishes 💖

</p>

<button
class="btn"
onclick="startSurprise()">

Start Surprise 💖

</button>

</div>

<script>

/* Start Music */

function startSurprise(){

const music =
document.getElementById("music");

music.play();

localStorage.setItem(
"birthdayMusic",
"on"
);

setTimeout(()=>{

window.location.href =
"birthday.html";

},800);

}

/* Floating Hearts */

function createHeart(){

const heart =
document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💖";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(20+Math.random()*25)+"px";

heart.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
